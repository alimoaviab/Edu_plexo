<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eduplexo — School Workspace</title>
    <meta name="description" content="Multi-school SaaS school workspace" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" /></noscript>
    <style>
      /* 
       * Hide material icon text names until the icon font is loaded.
       * This prevents "dashboard", "edit", "school" etc from flashing as text.
       * Icons are invisible (opacity:0) until font loads, then fade in smoothly.
       */
      .material-symbols-outlined {
        opacity: 0;
      }
      html.material-icons-loaded .material-symbols-outlined {
        opacity: 1;
        transition: opacity 0.1s ease-in;
      }
    </style>
    <script>
      // Detect Material Symbols font load and reveal icons instantly
      (function() {
        function reveal() {
          document.documentElement.classList.add('material-icons-loaded');
        }
        if (document.fonts && document.fonts.load) {
          document.fonts.load('20px "Material Symbols Outlined"').then(reveal).catch(reveal);
          // Also listen for all fonts ready (backup)
          document.fonts.ready.then(function() {
            reveal();
          });
        }
        // Ultimate fallback for old browsers
        setTimeout(reveal, 4000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
