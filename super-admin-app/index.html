<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" /></noscript>
    <style>
      .material-symbols-outlined {
        color: transparent !important;
        overflow: hidden !important;
        display: inline-block !important;
        width: 1em !important;
        height: 1em !important;
        line-height: 1 !important;
        vertical-align: middle;
      }
      html.material-icons-loaded .material-symbols-outlined {
        color: inherit !important;
      }
    </style>
    <script>
      (function() {
        function reveal() {
          document.documentElement.classList.add('material-icons-loaded');
        }
        if (document.fonts && document.fonts.load) {
          document.fonts.load('20px "Material Symbols Outlined"').then(reveal).catch(reveal);
          document.fonts.ready.then(reveal);
        }
        setTimeout(reveal, 5000);
      })();
    </script>
    <title>Eduplexo — Super Admin</title>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
