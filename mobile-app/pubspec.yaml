name: eduplexo
description: EduPlexo - School Management System mobile wrapper.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView with full feature support (file upload, camera, mic, downloads, etc.)
  flutter_inappwebview: ^6.1.5

  # Network connectivity check
  connectivity_plus: ^6.0.5

  # Runtime permissions (camera, mic, storage, notifications)
  permission_handler: ^11.3.1

  # Native splash screen generator
  flutter_native_splash: ^2.4.1

  # App launcher icon generator
  flutter_launcher_icons: ^0.13.1

  # Material icons
  cupertino_icons: ^1.0.8

  # URL launcher for external links (mailto, tel, maps, etc.)
  url_launcher: ^6.3.0

  # Path provider for downloads
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# ----------------------------------------------------------------
# Native splash screen configuration
# Run: dart run flutter_native_splash:create
# ----------------------------------------------------------------
flutter_native_splash:
  color: "#0F172A"
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    color: "#0F172A"
    icon_background_color: "#0F172A"
  android: true
  ios: true
  web: false
  fullscreen: true

# ----------------------------------------------------------------
# Launcher icon configuration
# Run: dart run flutter_launcher_icons
# ----------------------------------------------------------------
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
